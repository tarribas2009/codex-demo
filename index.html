<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hola App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="app-title">
        <p class="eyebrow">App web simple</p>
        <h1 id="app-title">Un boton y un hola</h1>
        <p class="description">Pulsa el boton para mostrar el saludo.</p>
        <button id="hello-button" class="hello-button" type="button">
          Decir hola
        </button>
        <p id="message" class="message" aria-live="polite">
          Aun no has pulsado el boton.
        </p>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
